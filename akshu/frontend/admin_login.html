<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Feedback System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .login-header h3 {
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.8rem;
        }
        
        .login-header p {
            color: rgba(255,255,255,0.9);
            margin: 10px 0 0 0;
            font-size: 0.95rem;
        }
        
        .login-body {
            padding: 40px 35px;
        }
        
        .login-body .form-control {
            height: 45px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin-bottom: 15px;
            padding: 0 15px;
            font-size: 0.95rem;
        }
        
        .login-body .form-control:focus {
            border-color: #eb3349;
            box-shadow: 0 0 0 3px rgba(235, 51, 73, 0.1);
        }
        
        .login-body .btn-login {
            height: 45px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 10px;
            border-radius: 8px;
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            border: none;
            color: white;
            transition: all 0.3s ease;
        }
        
        .login-body .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(235, 51, 73, 0.4);
            color: white;
        }
        
        .login-footer {
            text-align: center;
            padding: 0 35px 30px 35px;
            color: #999;
            font-size: 0.85rem;
        }
        
        .login-footer a {
            color: #eb3349;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        
        .remember-me input {
            accent-color: #eb3349;
        }
        
        .remember-me label {
            margin: 0 0 0 8px;
            color: #666;
        }

        .role-badge {
            display: inline-block;
            background: #eb3349;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .back-link {
            margin-top: 20px;
            text-align: center;
        }

        .back-link a {
            color: #eb3349;
            text-decoration: none;
            font-weight: 600;
        }

        .success-message {
            display: none;
            padding: 15px;
            background: #fff5f5;
            border-left: 4px solid #eb3349;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #721c24;
        }

        .error-message {
            display: none;
            padding: 15px;
            background: #fff5f5;
            border-left: 4px solid #dc3545;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #721c24;
        }

        .demo-credentials {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #856404;
        }

        .demo-credentials strong {
            display: block;
            margin-bottom: 8px;
            color: #333;
        }

        .demo-credentials code {
            background: rgba(0,0,0,0.05);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box" style="width: 100%; max-width: 450px;">
            <div class="login-header">
                <h3><i class="fas fa-tachometer-alt"></i> Admin Login</h3>
                <p>Administrator Dashboard</p>
            </div>
            
            <div class="login-body">
                <div class="role-badge">
                    <i class="fas fa-shield-alt"></i> Admin Portal
                </div>

                <div class="success-message" id="success-message">
                    <i class="fas fa-check-circle"></i> Admin login successful! Redirecting...
                </div>

                <div class="error-message" id="error-message"></div>

                <form id="admin-form">
                    <div class="mb-3">
                        <label class="form-label">Admin Username</label>
                        <input type="text" class="form-control" id="admin-username" placeholder="Enter admin username" value="admin" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="admin-password" placeholder="Enter your password" value="admin123" required>
                    </div>
                    
                    <div class="remember-me">
                        <input type="checkbox" id="admin-remember">
                        <label for="admin-remember">Remember me</label>
                    </div>
                    
                    <button type="submit" class="btn btn-login w-100">
                        <i class="fas fa-sign-in-alt"></i> Admin Login
                    </button>
                </form>

                <div class="demo-credentials">
                    <strong><i class="fas fa-info-circle"></i> Demo Credentials:</strong>
                    Username: <code>admin</code><br>
                    Password: <code>admin123</code>
                </div>

                <div class="back-link">
                    <a href="index.html">← Back to Role Selection</a>
                </div>
            </div>

            <div class="login-footer">
                <hr>
                <p style="margin: 0;">Secure Admin Access - For Authorized Users Only</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('admin-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('admin-username').value;
            const password = document.getElementById('admin-password').value;
            const remember = document.getElementById('admin-remember').checked;

            // Validate credentials
            if (username !== 'admin' || password !== 'admin123') {
                document.getElementById('error-message').textContent = '❌ Invalid admin credentials!';
                document.getElementById('error-message').style.display = 'block';
                return;
            }

            // Store login info
            localStorage.setItem('userRole', 'admin');
            localStorage.setItem('username', username);
            if (remember) {
                localStorage.setItem('rememberMe', 'true');
                localStorage.setItem('savedUsername', username);
            }

            // Show success message
            document.getElementById('success-message').style.display = 'block';
            
            // Redirect to admin dashboard
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });

        // Auto-fill saved username if remember me was checked
        window.addEventListener('load', function() {
            if (localStorage.getItem('rememberMe') === 'true') {
                document.getElementById('admin-username').value = localStorage.getItem('savedUsername') || 'admin';
                document.getElementById('admin-remember').checked = true;
            }
        });
    </script>
</body>
</html>
