<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Feedback System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .login-header h3 {
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.8rem;
        }
        
        .login-header p {
            color: rgba(255,255,255,0.9);
            margin: 10px 0 0 0;
            font-size: 0.95rem;
        }
        
        .login-body {
            padding: 40px 35px;
        }
        
        .login-body .form-control {
            height: 45px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin-bottom: 15px;
            padding: 0 15px;
            font-size: 0.95rem;
        }
        
        .login-body .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .login-body .btn-login {
            height: 45px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 10px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            transition: all 0.3s ease;
        }
        
        .login-body .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        .login-footer {
            text-align: center;
            padding: 0 35px 30px 35px;
            color: #999;
            font-size: 0.9rem;
        }
        
        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        
        .remember-me input {
            accent-color: #667eea;
        }
        
        .remember-me label {
            margin: 0 0 0 8px;
            color: #666;
        }

        .role-badge {
            display: inline-block;
            background: #38ef7d;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .back-link {
            margin-top: 20px;
            text-align: center;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .success-message {
            display: none;
            padding: 15px;
            background: #f0fff4;
            border-left: 4px solid #28a745;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #155724;
        }

        .error-message {
            display: none;
            padding: 15px;
            background: #fff5f5;
            border-left: 4px solid #dc3545;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box" style="width: 100%; max-width: 450px;">
            <div class="login-header">
                <h3><i class="fas fa-user-graduate"></i> Student Login</h3>
                <p>Feedback Management System</p>
            </div>
            
            <div class="login-body">
                <div class="role-badge">
                    <i class="fas fa-user-graduate"></i> Student Portal
                </div>

                <div class="success-message" id="success-message">
                    <i class="fas fa-check-circle"></i> Login successful! Redirecting...
                </div>

                <div class="error-message" id="error-message"></div>

                <form id="student-form">
                    <div class="mb-3">
                        <label class="form-label">Username or Email</label>
                        <input type="text" class="form-control" id="student-username" placeholder="Enter your username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="student-password" placeholder="Enter your password" required>
                    </div>
                    
                    <div class="remember-me">
                        <input type="checkbox" id="student-remember">
                        <label for="student-remember">Remember me</label>
                    </div>
                    
                    <button type="submit" class="btn btn-login w-100">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <div class="back-link">
                    Don't have an account? <a href="register.html">Register Here</a>
                </div>
            </div>

            <div class="login-footer">
                <hr>
                <p style="margin: 0;">New here? <a href="index.html">Choose a different role</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('student-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('student-username').value;
            const password = document.getElementById('student-password').value;
            const remember = document.getElementById('student-remember').checked;

            // Store login info
            localStorage.setItem('userRole', 'student');
            localStorage.setItem('username', username);
            if (remember) {
                localStorage.setItem('rememberMe', 'true');
                localStorage.setItem('savedUsername', username);
            }

            // Show success message
            document.getElementById('success-message').style.display = 'block';
            
            // Redirect to dashboard
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });

        // Auto-fill saved username if remember me was checked
        window.addEventListener('load', function() {
            if (localStorage.getItem('rememberMe') === 'true') {
                document.getElementById('student-username').value = localStorage.getItem('savedUsername') || '';
                document.getElementById('student-remember').checked = true;
            }
        });
    </script>
</body>
</html>
